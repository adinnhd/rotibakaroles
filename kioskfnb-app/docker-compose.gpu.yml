services:
  postgres:
    image: postgres:16-alpine
    container_name: kioskfnb-postgres
    environment:
      POSTGRES_DB: kioskfnb
      POSTGRES_USER: kioskfnb
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kioskfnb -d kioskfnb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kioskfnb-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_NAME: Olivia
      APP_ENV: local
      APP_KEY: base64:n3h9gxkVj2MDO1qYZnI+BSpW8kWkz2rj2i7gfbM1YGo=
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      SANCTUM_STATEFUL_DOMAINS: localhost,localhost:3000,localhost:8000,127.0.0.1,127.0.0.1:3000,127.0.0.1:8000
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: kioskfnb
      DB_USERNAME: kioskfnb
      DB_PASSWORD: secret
      CACHE_STORE: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: file
      SESSION_DOMAIN: ""
      SESSION_SAME_SITE: lax
      LOG_CHANNEL: stderr
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
      - ./backend/public/uploads:/var/www/html/public/uploads
    command: >
      sh -c "composer install &&
             php artisan migrate --force &&
             php artisan db:seed --force &&
             php artisan serve --host=0.0.0.0 --port=8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kioskfnb-frontend
    depends_on:
      - backend
      - ai-service
      - stt-service
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      NEXT_PUBLIC_CV_API_URL: http://localhost:8010
      NEXT_PUBLIC_STT_API_URL: http://localhost:8020
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"

  ai-service:
    build:
      context: ./ai/computer-vision
      dockerfile: app/Dockerfile
      args:
        DEVICE: gpu
    container_name: kioskfnb-ai-service
    environment:
      CV_MODEL_PATH: /app/models/yolov8n.pt
    ports:
      - "8010:8010"
    volumes:
      - ./ai/computer-vision:/app
      - ai_cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8010

  stt-service:
    build:
      context: ./ai/speech-to-text
      dockerfile: app/Dockerfile
      args:
        DEVICE: gpu
    container_name: kioskfnb-stt-service
    environment:
      STT_ENGINE: whisper
      STT_LANGUAGE: id
      WHISPER_MODEL: small
      WAKE_WORD: hai olivia
    ports:
      - "8020:8020"
    volumes:
      - ./ai/speech-to-text:/app
      - stt_cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8020

volumes:
  postgres_data:
  backend_vendor:
  frontend_node_modules:
  frontend_next:
  ai_cache:
  stt_cache:
